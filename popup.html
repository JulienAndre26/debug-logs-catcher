<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Debug Logs Catcher</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header>
        <span id="dot" class="dot off"></span>
        <h1>Debug Logs Catcher</h1>
    </header>

    <section class="status">
        <div class="row"><span>Status</span><span id="attachState">Idle</span></div>
        <div class="row"><span>WS sent</span><span id="sentCount">0</span></div>
        <div class="row"><span>WS received</span><span id="recvCount">0</span></div>
        <div class="row"><span>Console</span><span id="consoleCount">0</span></div>
        <div class="row"><span>Network</span><span id="networkCount">0</span></div>
    </section>

    <section class="actions">
        <button id="toggle">Start</button>
        <button id="clear">Clear</button>
        <button id="export" title="Export gzipped (.json.gz). Shift+click for raw JSON - way heavier." disabled>Export</button>
    </section>

    <details>
        <summary>Settings</summary>

        <h2 class="subhead">Auto-capture domains</h2>
        <p class="hint">One domain per line. Subdomains match (<code>example.com</code> matches <code>foo.example.com</code>).</p>
        <textarea id="autoDomains" rows="3" placeholder="myistra.some.domain.net&#10;myistra.other.domain.com"></textarea>
        <div class="row-buttons">
            <button id="saveAutoDomains">Save</button>
            <button id="clearAutoDomains">Clear</button>
            <span id="saveAck" class="ack hidden">saved</span>
        </div>

        <label class="toggle">
            <input type="checkbox" id="clearOnReload">
            <span>Clear buffer on page reload</span>
        </label>
        <label class="toggle">
            <input type="checkbox" id="includeAllHeaders">
            <span>Include all headers in export (auth, cookies, CSP&hellip;)</span>
        </label>

        <p class="tip">Tip: Shift+click <em>Export</em> for a raw <code>.json</code>.</p>
    </details>

    <p id="errBox" class="err hidden"></p>

    <script src="popup.js"></script>
</body>
</html>
